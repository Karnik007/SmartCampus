{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preferences – SmartCampus AI</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
    <meta name="description" content="View your preference history." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260226c" />
    <style>
        .pref-timeline {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .pref-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: border-color 0.2s ease;
            animation: fadeInUp 0.4s ease both;
        }

        .pref-card:hover {
            border-color: var(--border-color-hover);
        }

        .pref-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .pref-card-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .pref-card-badge {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .pref-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
        }

        .pref-item {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .pref-item-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .pref-item-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-state-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .empty-state-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .empty-state-text {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <section class="page-section" id="preferences">
        <div class="container">
            <div class="section-header">
                <span class="section-badge">Settings</span>
                <h2 class="section-title">Your <span class="gradient-text">Preferences</span></h2>
                <p class="section-subtitle">A history of your preference snapshots used for recommendations.</p>
            </div>

            <div id="preferencesContent">
                <div class="empty-state" id="loadingState">
                    <div class="nearby-spinner"></div>
                    <p class="empty-state-text" style="margin-top:1rem;">Loading preferences…</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>Built with ❤️ for Hackathon 2026 · <strong>SmartCampus AI</strong> — Transparent Recommender System</p>
        </div>
    </footer>

    <script src="{% static 'js/api.js' %}?v=20260226c"></script>
    <script src="{% static 'js/auth.js' %}?v=20260226c"></script>
    <script src="{% static 'js/gooey-nav.js' %}?v=20260226c"></script>
    <script src="{% static 'js/shared.js' %}?v=20260226c"></script>
    <!-- User Data for JS -->
    {% if user.is_authenticated %}
    <script type="application/json" id="user-data">
        {"name": "{{ user.first_name|default:user.email|escapejs }}", "email": "{{ user.email|escapejs }}", "id": {{ user.id }}, "provider": "email"}
    </script>
    {% endif %}

    <script>
        // Parse user data safely to avoid IDE lint errors
        var userDataEl = document.getElementById('user-data');
        if (userDataEl) {
            if (!localStorage.getItem('smartcampus-user')) {
                try {
                    var data = JSON.parse(userDataEl.textContent);
                    localStorage.setItem('smartcampus-user', JSON.stringify(data));
                } catch(e) {}
            }
        } else {
            localStorage.removeItem('smartcampus-user');
        }
    </script>
    <script>
        (function () {
            'use strict';
            initShared();

            var container = document.getElementById('preferencesContent');

            /* Fetch preference history from the Django context */
            var preferences = {{ preferences_json| safe |default: "[]"
        }};

        function renderPreferences(prefs) {
            if (!prefs || prefs.length === 0) {
                container.innerHTML =
                    '<div class="empty-state">' +
                    '<div class="empty-state-icon">⚙️</div>' +
                    '<p class="empty-state-title">No preferences saved yet</p>' +
                    '<p class="empty-state-text">Submit the preferences form on the Dashboard to see your history here.</p>' +
                    '<a href="/dashboard/" class="btn btn-primary" style="margin-top:1.25rem;display:inline-block;text-decoration:none;">Go to Dashboard</a>' +
                    '</div>';
                return;
            }

            var html = '<div class="pref-timeline">';
            for (var i = 0; i < prefs.length; i++) {
                var p = prefs[i];
                var dateStr = p.created_at ? new Date(p.created_at).toLocaleString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
                var interests = (p.interests || []).join(', ') || 'None';
                html +=
                    '<div class="pref-card" style="animation-delay:' + (i * 0.06) + 's">' +
                    '<div class="pref-card-header">' +
                    '<span class="pref-card-date">📅 ' + esc(dateStr) + '</span>' +
                    (i === 0 ? '<span class="pref-card-badge">Latest</span>' : '') +
                    '</div>' +
                    '<div class="pref-grid">' +
                    '<div class="pref-item"><span class="pref-item-label">Budget</span><span class="pref-item-value">₹' + (p.budget || 0) + '</span></div>' +
                    '<div class="pref-item"><span class="pref-item-label">Dietary</span><span class="pref-item-value">' + esc(p.dietary || 'All') + '</span></div>' +
                    '<div class="pref-item"><span class="pref-item-label">Location</span><span class="pref-item-value">' + esc(p.location || 'Any') + '</span></div>' +
                    '<div class="pref-item"><span class="pref-item-label">Time</span><span class="pref-item-value">' + (p.available_time || 0) + ' min</span></div>' +
                    '<div class="pref-item"><span class="pref-item-label">Interests</span><span class="pref-item-value">' + esc(interests) + '</span></div>' +
                    '<div class="pref-item"><span class="pref-item-label">Price Wt.</span><span class="pref-item-value">' + (p.weight_price || 0) + '%</span></div>' +
                    '<div class="pref-item"><span class="pref-item-label">Rating Wt.</span><span class="pref-item-value">' + (p.weight_rating || 0) + '%</span></div>' +
                    '<div class="pref-item"><span class="pref-item-label">Distance Wt.</span><span class="pref-item-value">' + (p.weight_distance || 0) + '%</span></div>' +
                    '</div>' +
                    '</div>';
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function esc(s) {
            var d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        renderPreferences(preferences);
        }) ();
    </script>

</body>

</html>
